services:
  - type: web
    name: medscan-cardio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        value: sqlite:////data/cardio_ai.db
      - key: UPLOAD_DIR
        value: /data/uploads
    disk:
      name: cardio-data
      mountPath: /data
      sizeGB: 1
